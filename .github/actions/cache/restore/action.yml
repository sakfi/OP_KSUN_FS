name: '🚀 High-Speed Cache Restore'
description: 'Restores directories from GitHub Releases cache buckets'

inputs:
  cache_path:
    description: 'Directory path to restore to'
    required: true
  cache_key:
    description: 'Cache key prefix'
    required: true
  cache_bucket:
    description: 'Bucket name (used for tag categorization)'
    required: false
    default: 'general-cache'
  github_token:
    description: 'GitHub Token'
    required: true

outputs:
  cache-hit:
    description: 'Whether a cache was found'
    value: ${{ steps.restore.outputs.hit }}

runs:
  using: "composite"
  steps:
    - name: 📥 Restore and Extract
      id: restore
      shell: bash
      run: |
        set -euo pipefail
        
        PATH_TO_RESTORE="${{ inputs.cache_path }}"
        CACHE_KEY="${{ inputs.cache_key }}"
        BUCKET="${{ inputs.cache_bucket }}"
        
        # Use bucket in tag name to avoid collision if keys are same across buckets
        TAG_NAME="${BUCKET}-latest"
        ARCHIVE_NAME="${CACHE_KEY}.tar.zst"
        
        echo "::group::🚀 Restoring Cache: $CACHE_KEY from $BUCKET"
        
        # 1. Check if release exists
        if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
          echo "hit=false" >> "$GITHUB_OUTPUT"
          echo "Cache bucket $TAG_NAME not found."
          echo "::endgroup::"
          exit 0
        fi
        
        # 2. Download assets using aria2c for speed
        echo "Fetching asset list..."
        # We look for the specific archive in the bucket
        ASSETS=$(gh api repos/${{ github.repository }}/releases/tags/"$TAG_NAME" --jq '.assets[].name')
        
        if ! echo "$ASSETS" | grep -q "$CACHE_KEY"; then
          echo "hit=false" >> "$GITHUB_OUTPUT"
          echo "Archive $CACHE_KEY not found in bucket $TAG_NAME."
          echo "::endgroup::"
          exit 0
        fi
        
        mkdir -p "$(dirname "$PATH_TO_RESTORE")"
        
        # Check if it's a split archive
        if echo "$ASSETS" | grep -q "${ARCHIVE_NAME}.part"; then
          echo "Detected split archive. Downloading parts..."
          for part in $(echo "$ASSETS" | grep "${ARCHIVE_NAME}.part" | sort); do
            gh release download "$TAG_NAME" -p "$part" --clobber
          done
          echo "Reassembling archive..."
          cat "${ARCHIVE_NAME}.part"* > "$ARCHIVE_NAME"
          rm "${ARCHIVE_NAME}.part"*
        else
          echo "Downloading $ARCHIVE_NAME..."
          gh release download "$TAG_NAME" -p "$ARCHIVE_NAME" --clobber
        fi
        
        # 3. Extract
        echo "Extracting archive..."
        tar --use-compress-program="zstd -d -T0" -xf "$ARCHIVE_NAME" -C "$(dirname "$PATH_TO_RESTORE")"
        rm "$ARCHIVE_NAME"
        
        echo "hit=true" >> "$GITHUB_OUTPUT"
        echo "✅ Cache restored successfully"
        echo "::endgroup::"
