name: 🔨 Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      custom_release_tag:
        description: 'Provide a custom release tag (e.g., v2.0.0). Leave empty to auto-generate.'
        required: false
        type: string
        default: ''
      op_model:
        description: 'Select the OnePlus Devices to build'
        required: true
        type: choice
        options:
          - All
          - OP-ACE
          - OP-ACE-2
          - OP-ACE-2-PRO
          - OP-ACE-2V
          - OP-ACE-3
          - OP-ACE-3-PRO
          - OP-ACE-3V
          - OP-ACE-5
          - OP-ACE-5-PRO
          - OP-ACE-5-RACE
          - OP-ACE-5-ULTRA
          - OP-ACE-6
          - OP-ACE-6T
          - OP-ACE-RACE
          - OP-NORD-3
          - OP-NORD-4
          - OP-NORD-4-CE
          - OP-NORD-5
          - OP-NORD-CE-5
          - OP-NORD-CE4-LITE
          - OP-OPEN
          - OP10pro
          - OP10r
          - OP10t
          - OP11
          - OP11r
          - OP12
          - OP12r
          - OP13
          - OP13-CPH
          - OP13-PJZ
          - OP13S
          - OP13T
          - OP13r
          - OP15
          - OP15r
          - OP15T
          - OP-TURBO-6
          - OP-TURBO-6V
        default: All
      android_version_filter:
        description: 'Select the Android Version to build'
        required: true
        type: choice
        options:
          - All
          - oos14
          - oos15
          - oos16
          - oos14+oos15
          - oos15+oos16
          - oos14+oos16
        default: All
      kernel_version_filter:
        description: 'Select the Kernel Version to build'
        required: true
        type: choice
        options:
          - All
          - android12-5.10
          - android13-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
        default: All
      ksu_options:
        description: 'Enter KernelSU build json'
        required: true
        type: string
        default: '[{"type":"ksun","hash":"551ad80473f60e052917aec08abf5323b6ab2f7c"}]'
      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options: [O2, O3]
        default: O2
      clean_build:
        description: 'Clean build (no ccache)'
        type: boolean
        default: false
      build_timestamp:
        description: 'Custom kernel build timestamp for uname -a'
        type: string
        default: ''
      # Legacy inputs preserved as optional overrides
      android12-5_10_susfs_branch_or_commit:
        description: 'Override SusFS for android12-5.10'
        type: string
        default: '674f72b6f683e837d7f557704cabe00a83eeb0b4'
      android13-5_15_susfs_branch_or_commit:
        description: 'Override SusFS for android13-5.15'
        type: string
        default: 'eaa5d299dd85a4230f936b94dc5dd8303f27130a'
      android14-6_1_susfs_branch_or_commit:
        description: 'Override SusFS for android14-6.1'
        type: string
        default: '971cc4e770b7f344a4df35ce92d7a859e6a1e0fd'
      android15-6_6_susfs_branch_or_commit:
        description: 'Override SusFS for android15-6.6'
        type: string
        default: '85bcfac5edc8ba7808581e8d0a3ca9c7deca78e4'
      android16-6_12_susfs_branch_or_commit:
        description: 'Override SusFS for android16-6.12'
        type: string
        default: '5fbf04e8c6c08b8ca759e0ac81bed7d2dc96f7f8'

jobs:
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_count: ${{ steps.set-matrix.outputs.count }}
      active_gki_keys: ${{ steps.set-matrix.outputs.active_gki_keys }}
      susfs_base_version: ${{ steps.set-matrix.outputs.susfs_base_version }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: configs/
          sparse-checkout-cone-mode: false

      - name: 🔍 Generate build matrix (Dynamic Sync)
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Matrix generation"
          
          # Matrix Filters
          input="${{ github.event.inputs.op_model }}"
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'
          ksu_options_normalized=$(echo "$ksu_options_raw" | jq -c 'map(if .type then .type |= ascii_upcase | if .hash == null then if .type == "KSUN" then .hash = "dev" elif .type == "KSU" then .hash = "main" else .hash end else . end else error("No type found") end)')
          
          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            jq -r '.' "$file" >> matrix.json
            if [ $((i+1)) -lt ${#all_json_files[@]} ]; then echo "," >> matrix.json; fi
          done
          echo "]" >> matrix.json
          
          jq_f="."
          case "$input" in All) ;; *) jq_f="map(select(.model == \"$input\"))" ;; esac
          
          case "${{ github.event.inputs.android_version_filter }}" in
            oos14) jq_f+=" | map(select(.os_version == \"OOS14\"))" ;;
            oos15) jq_f+=" | map(select(.os_version == \"OOS15\"))" ;;
            oos16) jq_f+=" | map(select(.os_version == \"OOS16\"))" ;;
          esac

          if [[ "${{ github.event.inputs.kernel_version_filter }}" != "All" ]]; then
            IFS='-' read -r ak_android ak_kernel <<< "${{ github.event.inputs.kernel_version_filter }}"
            jq_f+=" | map(select(.android_version == \"$ak_android\" and .kernel_version == \"$ak_kernel\"))"
          fi

          filtered=$(jq -c "$jq_f" matrix.json)
          
          # Resolve KSU via GraphQL
          ksu_type=$(echo "$ksu_options_normalized" | jq -r '.[0].type')
          ksu_ref=$(echo "$ksu_options_normalized" | jq -r '.[0].hash')
          ksu_o=$([ "$ksu_type" == "KSUN" ] && echo "KernelSU-Next" || echo "tiann")
          ksu_r=$([ "$ksu_type" == "KSUN" ] && echo "KernelSU-Next" || echo "KernelSU")
          
          K_HASH=$(gh api graphql -f query='query($o:String!,$n:String!,$e:String!){repository(owner:$o,name:$n){object(expression:$e){... on Commit{oid}}}}' -f o="$ksu_o" -f n="$ksu_r" -f e="$ksu_ref" --jq '.data.repository.object.oid // empty')
          [ -z "$K_HASH" ] && { echo "::error::KSU unresolved"; exit 1; }
          echo "ksu_resolved_hash=$K_HASH" >> $GITHUB_OUTPUT
          
          # Resolve SUSFS via API + Version Detection
          PROJECT_ID="simonpunk%2fsusfs4ksu"
          declare -A s_branches=( ["android12-5.10"]="gki-android12-5.10" ["android13-5.15"]="gki-android13-5.15" ["android14-6.1"]="gki-android14-6.1" ["android15-6.6"]="gki-android15-6.6" ["android16-6.12"]="gki-android16-6.12" )
          
          susfs_base=""
          merged=$(jq -n --argjson d "$filtered" --argjson list "$ksu_options_normalized" '[ $d[] as $dev | $list[] as $ksu | ($dev + {ksu_type: $ksu.type, ksu_hash: $ksu.hash, ksu_resolved_hash: "'$K_HASH'"}) ]')
          
          active_keys=$(echo "$filtered" | jq -r '.[] | select(.susfs == true) | "\(.android_version)-\(.kernel_version)"' | sort -u)
          
          for k in $active_keys; do
            br="${s_branches[$k]}"
            S_DATA=$(curl -s "https://gitlab.com/api/v4/projects/${PROJECT_ID}/repository/commits/${br}")
            S_H=$(echo "$S_DATA" | jq -r '.id')
            
            if [ -z "$susfs_base" ]; then
              susfs_base=$(curl -s "https://gitlab.com/api/v4/projects/${PROJECT_ID}/repository/files/include%2flinux%2fsusfs.h/raw?ref=${br}" | grep '#define SUSFS_VERSION' | awk -F'"' '{print $2}')
            fi
            echo "susfs_hash_${k//./_}=$S_H" >> $GITHUB_OUTPUT
            merged=$(echo "$merged" | jq -c --arg key "$k" --arg hash "$S_H" 'map(if "\(.android_version)-\(.kernel_version)" == $key then . + {susfs_resolved_hash: $hash} else . end)')
          done
          
          echo "matrix=$(jq -nc --argjson items "$merged" "{include: \$items}")" >> $GITHUB_OUTPUT
          echo "susfs_base_version=$susfs_base" >> $GITHUB_OUTPUT
          echo "active_gki_keys=$(echo "$active_keys" | jq -Rc 'split("\n") | select(. != "")')" >> $GITHUB_OUTPUT
          echo "count=$(echo "$merged" | jq 'length')" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Upload matrix
        uses: actions/upload-artifact@v7
        with:
          name: build-matrix
          path: matrix.json

  build:
    needs: set-op-model
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Execute Action
        uses: ./.github/actions
        with:
          op_config_json: ${{ toJSON(matrix) }}
          ksu_type: ${{ matrix.ksu_type }}
          ksu_branch_or_hash: ${{ matrix.ksu_resolved_hash }}
          susfs_commit_hash_or_branch: ${{ matrix.susfs_resolved_hash }}
          optimize_level: ${{ inputs.optimize_level }}
          clean: ${{ inputs.clean_build }}

  trigger-release:
    needs: [set-op-model, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUSFS_BASE_VERSION: ${{ needs.set-op-model.outputs.susfs_base_version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Standard Tagging
        run: |
          if [ -n "${{ github.event.inputs.custom_release_tag }}" ]; then
            TAG="${{ github.event.inputs.custom_release_tag }}"
          else
            TAG="${{ env.SUSFS_BASE_VERSION }}-r${{ github.run_number }}"
          fi
          echo "NEW_TAG=$TAG" >> $GITHUB_ENV

      - name: 📜 Generate Changelog
        run: |
          set -euo pipefail
          echo "Generating automated changelog..."
          
          # Find the last release tag before the current commit
          # Use git describe to find the closest reachable tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          
          echo "📝 Changelog" > release_notes.md
          echo "" >> release_notes.md
          echo "### This Release" >> release_notes.md
          echo "" >> release_notes.md
          
          # Get commit subjects since last tag, filtering out noise
          # Filters: Automated releases, Merge commits, and workflow sync commits
          git log "$LAST_TAG..HEAD" --pretty=format:"-%s" | \
            grep -vE "Automated|Merge|Workflow sync|sync:" | \
            grep -v "^-$" | \
            sed 's/^- /-/g' >> release_notes.md
          
          echo "" >> release_notes.md
          echo "### Previous Releases" >> release_notes.md
          echo "See [Releases Page](${{ github.server_url }}/${{ github.repository }}/releases)" >> release_notes.md
          
          echo "--- Generated Release Notes ---"
          cat release_notes.md

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./all-artifacts/

      - name: 📂 Flatten and Verify ZIPs
        run: |
          mkdir -p ./release-assets
          find ./all-artifacts/ -maxdepth 2 -name "*.zip" -exec mv {} ./release-assets/ \;
          echo "Files to be uploaded:"
          ls -R ./release-assets/

      - name: 🚀 Create GitHub Release
        run: |
          gh release create "${{ env.NEW_TAG }}" \
            --title "OnePlus Kernels With KSUN & SUSFS integrated — SakFi (${{ env.SUSFS_BASE_VERSION }})" \
            --notes-file release_notes.md \
            ./release-assets/*.zip
