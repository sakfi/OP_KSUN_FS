name: Telegram on Release

on:
  release:
    types: [published, edited]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Build Telegram message
        run: |
          if [ "${{ github.event.action }}" = "published" ]; then
            {
              echo 'MESSAGE<<EOF'
              echo '🚀 New release published'
              echo
              echo 'Repository: ${{ github.repository }}'
              echo 'Tag: ${{ github.event.release.tag_name }}'
              echo 'Title: ${{ github.event.release.name }}'
              echo 'Release URL: ${{ github.event.release.html_url }}'
              echo 'EOF'
            } >> $GITHUB_ENV
          elif [ "${{ github.event.action }}" = "edited" ]; then
            {
              echo 'MESSAGE<<EOF'
              echo '✏️ Release updated'
              echo
              echo 'Repository: ${{ github.repository }}'
              echo 'Tag: ${{ github.event.release.tag_name }}'
              echo 'Title: ${{ github.event.release.name }}'
              echo 'Release URL: ${{ github.event.release.html_url }}'
              echo 'EOF'
            } >> $GITHUB_ENV
          else
            echo "Unsupported release action: ${{ github.event.action }}"
            exit 0
          fi

      - name: Send message to Telegram group
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_GROUP }}" \
            --data-urlencode "text=$MESSAGE"

      - name: Send message to Telegram channel
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHANNEL }}" \
            --data-urlencode "text=$MESSAGE"
